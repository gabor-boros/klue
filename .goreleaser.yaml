# GoReleaser configuration for klue.
# Docs: https://goreleaser.com
version: 2

project_name: klue

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: klue
    main: .
    binary: klue
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: klue
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Release notes are generated by git-cliff in CI and passed via --release-notes.
changelog:
  disable: true

release:
  github:
    owner: gabor-boros
    name: klue
  draft: false
  prerelease: auto

homebrew_casks:
  - repository:
      owner: gabor-boros
      name: homebrew-brew
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: "Gabor Boros"
      email: gabor.brs@gmail.com
    homepage: "https://github.com/gabor-boros/klue"
    description: "Kubernetes troubleshooting that explains why, not just what."
    license: MIT
    custom_block: |
      head "https://github.com/gabor-boros/klue", branch: "main"

      livecheck do
        url "https://github.com/gabor-boros/klue/releases"
        regex(/^v(\d+(?:\.\d+)+)$/i)
      end
