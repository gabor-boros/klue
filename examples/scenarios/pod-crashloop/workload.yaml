apiVersion: v1
kind: Pod
metadata:
  name: crashloop-demo
  namespace: klue-demo-crashloop
  labels:
    app.kubernetes.io/part-of: klue-examples
    app: crashloop-demo
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "crashing intentionally"
          sleep 2
          exit 1
