apiVersion: v1
kind: Pod
metadata:
  name: backend-demo
  namespace: klue-demo-selector-mismatch
  labels:
    app.kubernetes.io/part-of: klue-examples
    app: backend
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - sleep 3600
      ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: mismatch-demo
  namespace: klue-demo-selector-mismatch
  labels:
    app.kubernetes.io/part-of: klue-examples
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
