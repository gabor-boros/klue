apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-correlation-demo
  namespace: klue-demo-probe-correlation
  labels:
    app.kubernetes.io/part-of: klue-examples
    app: probe-correlation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: probe-correlation
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: klue-examples
        app: probe-correlation
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "starting api without health endpoint"
              while true; do
                echo "ERROR dial tcp redis:6379: connect: connection refused"
                sleep 5
              done
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 1
        - name: metrics
          image: busybox:1.36
          command:
            - sh
            - -c
            - sleep 3600
---
apiVersion: v1
kind: Service
metadata:
  name: probe-correlation-demo
  namespace: klue-demo-probe-correlation
  labels:
    app.kubernetes.io/part-of: klue-examples
spec:
  selector:
    app: probe-correlation
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: klue-demo-probe-correlation
  labels:
    app.kubernetes.io/part-of: klue-examples
spec:
  selector:
    app: redis-backend-missing
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
