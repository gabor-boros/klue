apiVersion: v1
kind: Pod
metadata:
  name: config-missing-demo
  namespace: klue-demo-config-missing
  labels:
    app.kubernetes.io/part-of: klue-examples
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - sleep 3600
      envFrom:
        - configMapRef:
            name: does-not-exist-config
